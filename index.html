    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "DGBM Risk Control",
        "alternateName": "DGBM Calculator",
        "description": "Calculadora gratuita de riesgo para trading Spot y Futures que estima tamaño de posición, fees, margen, stop loss y objetivos de riesgo-beneficio.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Cualquier sistema con navegador web",
        "inLanguage": "es",
        "isAccessibleForFree": true,
        "author": {
          "@type": "Person",
          "name": "DGBAUTISTA"
        },
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Cálculo de tamaño de posición",
          "Estimación de fees de trading",
          "Cálculo de margen para Futures",
          "Objetivos de riesgo-beneficio de 1:1 a 1:5",

        ]

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        const stored = localStorage.getItem("risk-control-theme");
        const mode = ["light", "dark", "system"].includes(stored) ? stored : "system";
        const systemDark = matchMedia("(prefers-color-scheme: dark)").matches;
        const resolved = mode === "dark" || (mode === "system" && systemDark) ? "dark" : "light";

        document.documentElement.classList.toggle("dark", resolved === "dark");
        document.documentElement.dataset.theme = resolved;
        document.documentElement.style.colorScheme = resolved;
      })();
    </script>

  <body>
